services:
  quran-read-backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: "24.18.0"
    image: quran-read-backend:1.0.0
    container_name: quran-read-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      QURAN_DATABASE_PATH: /app/data/quran.sqlite
    ports:
      - "127.0.0.1:4423:3000"
