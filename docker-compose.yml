services:
  quran-read-backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: "22.12.0"
    image: quran-read-backend:1.0.0
    container_name: quran-read-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4423"
      QURAN_DATABASE_PATH: /app/data/quran.sqlite
    ports:
      - "4423:4423"
